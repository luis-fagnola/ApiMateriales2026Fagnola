<!DOCTYPE html>
<html lang="es">
<head>
	<!-- Configuracion basica y estilos globales -->
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Materiales</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
	<link rel="stylesheet" href="/CSS/site.css">
</head>
<body>
	<!-- Barra de navegacion principal -->
	<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
		<div class="container">
			<a class="navbar-brand fw-bold" href="/Inicio.html">API Materiales</a>
			<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMateriales">
				<span class="navbar-toggler-icon"></span>
			</button>
			<div class="collapse navbar-collapse" id="navMateriales">
				<ul class="navbar-nav ms-auto">
					<li class="nav-item"><a class="nav-link" href="/Inicio.html">Inicio</a></li>
					<li class="nav-item"><a class="nav-link" href="/Rubros.html">Rubros</a></li>
					<li class="nav-item"><a class="nav-link" href="/Productos.html">Productos</a></li>
					<li class="nav-item"><a class="nav-link" href="/Materiales.html">Materiales</a></li>
				</ul>
			</div>
		</div>
	</nav>

	<!-- Contenido principal del modulo -->
	<main class="container py-4">
		<!-- Tabla con listado y acciones -->
		<div class="card shadow-sm border-0">
			<div class="card-header bg-white d-flex flex-wrap gap-2 align-items-center justify-content-between">
				<h1 class="h5 mb-0">Materiales</h1>
				<button type="button" class="btn btn-primary" id="btn-nuevo-material">Nuevo material</button>
			</div>
			<div class="card-body">
				<div id="mensaje-material" class="alert d-none" role="alert"></div>
				<div class="table-responsive">
					<table class="table table-hover align-middle mb-0">
						<thead class="table-light">
							<tr>
								<th>ID</th>
								<th>Descripcion</th>
								<th>Rubro</th>
								<th>Precio costo</th>
								<th>Estado</th>
								<th class="text-end">Acciones</th>
							</tr>
						</thead>
						<tbody id="tabla-materiales"></tbody>
					</table>
				</div>
			</div>
		</div>
	</main>

	<!-- Modal para alta/edicion -->
	<div class="modal fade" id="modal-material" tabindex="-1" aria-hidden="true">
		<div class="modal-dialog">
			<div class="modal-content">
				<div class="modal-header">
					<h2 id="titulo-form-material" class="modal-title fs-5">Nuevo material</h2>
					<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
				</div>
				<form id="form-material" novalidate>
					<div class="modal-body">
						<input type="hidden" id="material-id">
						<div class="mb-3">
							<label for="descripcion" class="form-label">Descripcion</label>
							<input id="descripcion" type="text" class="form-control" maxlength="120" minlength="3" required>
							<div class="invalid-feedback">La descripcion es obligatoria y debe tener minimo 3 caracteres.</div>
						</div>
						<div class="mb-3">
							<label for="rubro" class="form-label">Rubro</label>
							<select id="rubro" class="form-select" required></select>
							<div class="invalid-feedback">Debe seleccionar un rubro valido.</div>
						</div>
						<div class="mb-3">
							<label for="precio-costo" class="form-label">Precio costo</label>
							<input id="precio-costo" type="number" class="form-control" min="0" step="0.01" required>
							<div class="invalid-feedback">Ingrese un precio valido mayor o igual a 0.</div>
						</div>
						<div class="form-check">
							<input id="eliminado" class="form-check-input" type="checkbox">
							<label class="form-check-label" for="eliminado">Marcado como eliminado</label>
						</div>
					</div>
					<div class="modal-footer">
						<button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
						<button type="submit" class="btn btn-primary">Guardar</button>
					</div>
				</form>
			</div>
		</div>
	</div>

	<!-- Scripts de Bootstrap, navbar y modulo -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
	<script src="/JS/navbar.js"></script>
	<script src="/JS/materiales.js"></script>
</body>
</html>
